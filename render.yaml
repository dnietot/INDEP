services:
  - type: web
    name: confidencialidad-clientes
    runtime: static
    buildCommand: node build-render-config.js
    staticPublishPath: prototipo-confidencialidad
    envVars:
      - key: ENTRA_TENANT
        value: 100c493f-7265-4dd6-9a05-63e1a210e604
      - key: ENTRA_CLIENT_ID
        value: 9d3e6808-f124-4324-875c-7e6da0b0a3bf
      - key: ALLOWED_EMAIL_DOMAIN
        value: "@bakertilly.co"
      - key: EMAIL_WEBHOOK_URL
        sync: false
      - key: CLIENTS_CSV_URL
        value: clientes.csv
      - key: SHOW_ALL_CLIENTS_WHEN_UNASSIGNED
        value: "false"
      - key: TEMP_ADMIN_ENABLED
        value: "true"
      - key: TEMP_ADMIN_LOGIN
        value: admin
      - key: TEMP_ADMIN_NAME
        value: Admin
      - key: TEMP_ADMIN_EMAIL
        value: admin@bakertilly.co
      - key: TEMP_ADMIN_PASSWORD_HASH
        sync: false
